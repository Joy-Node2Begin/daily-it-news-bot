services:
  - type: web
    name: n8n-news-bot
    env: docker
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true

    # Persistent disk to preserve workflows, credentials, and execution history between deploys
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1

    envVars:
      - key: N8N_PORT
        value: 10000
      - key: PORT
        value: 10000
      - key: WEBHOOK_URL
        value: https://n8n-news-bot-mnse.onrender.com
      - key: N8N_HOST
        value: 0.0.0.0
      - key: GENERIC_TIMEZONE
        value: Asia/Kolkata
      - key: N8N_DIAGNOSTICS_ENABLED
        value: false
      - key: EXECUTIONS_DATA_SAVE_ON_ERROR
        value: all
      - key: EXECUTIONS_DATA_SAVE_ON_SUCCESS
        value: all
